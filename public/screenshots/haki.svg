<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#09090b"/>
  <!-- Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <g transform="translate(100, 100)">
    <!-- Data Stream -->
    <path d="M 0 50 Q 150 -50 300 50 T 600 50" fill="none" stroke="#3f3f46" stroke-width="4"/>
    <path d="M 0 50 Q 150 -50 300 50 T 600 50" fill="none" stroke="#10b981" stroke-width="4" stroke-dasharray="10, 20"/>
    
    <!-- Interface -->
    <rect x="150" y="80" width="300" height="150" fill="#18181b" stroke="#27272a" stroke-width="2" rx="8"/>
    <rect x="150" y="80" width="300" height="30" fill="#27272a" rx="8" clip-path="inset(0 0 0 0 round 8px 8px 0 0)"/>
    <circle cx="170" cy="95" r="4" fill="#ef4444"/>
    <circle cx="185" cy="95" r="4" fill="#eab308"/>
    <circle cx="200" cy="95" r="4" fill="#10b981"/>
    
    <text x="170" y="140" fill="#10b981" font-family="monospace" font-size="14">watsonx.ai &gt; Telemedicine</text>
    <text x="170" y="170" fill="#a1a1aa" font-family="monospace" font-size="12">Patient matching: 94% confidence</text>
    <text x="170" y="190" fill="#fafafa" font-family="monospace" font-size="12">Resource allocated: Dr. K. (Rural Route B)</text>
  </g>
  <text x="40" y="410" fill="#3f3f46" font-family="monospace" font-size="14" font-weight="bold">SYSTEM ID: HAKI // ARCHITECTURE: ORCHESTRATOR</text>
</svg>
