backend:
  name: github
  repo: kwisdomk/tjowk
  branch: main
  base_url: https://kwaix.dev
  auth_endpoint: api/auth
  auth_scope: public_repo

collections:
  # Phase 1/2: Status-only collection.
  # Profile, certifications, timeline, projects, and journal collections
  # are deferred to later phases per docs/guides/09-cms.md §Implementation Sequence.
  - name: "status"
    label: "Status"
    description: "Current operation and live status block"
    delete: false
    files:
      - file: "content/status.json"
        label: "Current Status"
        name: "status"
        fields:
          - {label: "Operation", name: "operation", widget: "string"}
          - {label: "Secondary Operation", name: "secondaryOp", widget: "string"}
          - {label: "Machine", name: "machine", widget: "string"}
          - {label: "Uptime", name: "uptime", widget: "select", options: ["ACTIVE", "STANDBY", "MAINTENANCE"]}
          - {label: "Last Updated", name: "lastUpdated", widget: "string"}
